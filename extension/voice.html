<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Microphone Permission - PiNE AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        .permission-card {
            background: white;
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        
        h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 12px;
        }
        
        p {
            font-size: 15px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-bottom: 12px;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        
        .status.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }
        
        .status.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }
        
        .features {
            text-align: left;
            margin: 24px 0;
            padding: 20px;
            background: #f9fafb;
            border-radius: 12px;
        }
        
        .feature {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
            color: #4b5563;
        }
        
        .feature:last-child {
            margin-bottom: 0;
        }
        
        .feature-icon {
            width: 24px;
            height: 24px;
            margin-right: 12px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="permission-card">
        <div class="icon">🎤</div>
        <h1>Enable Voice Input</h1>
        <p>PiNE AI needs microphone access to transcribe your voice and verify claims hands-free.</p>
        
        <div class="features">
            <div class="feature">
                <span class="feature-icon">✨</span>
                <span>Smart claim detection</span>
            </div>
            <div class="feature">
                <span class="feature-icon">🔒</span>
                <span>Audio processed securely</span>
            </div>
            <div class="feature">
                <span class="feature-icon">⚡</span>
                <span>Fast transcription</span>
            </div>
        </div>
        
        <button class="btn btn-primary" id="grantBtn">Grant Microphone Access</button>
        
        <div class="status" id="status"></div>
    </div>

    <script>
        const grantBtn = document.getElementById('grantBtn');
        const status = document.getElementById('status');
        
        grantBtn.addEventListener('click', async () => {
            grantBtn.disabled = true;
            grantBtn.textContent = 'Requesting permission...';
            
            try {
                // Request microphone access
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Permission granted - stop the stream
                stream.getTracks().forEach(track => track.stop());
                
                // Save permission state
                await chrome.storage.local.set({ micPermissionGranted: true });
                
                // Show success
                status.className = 'status success';
                status.textContent = '✓ Permission granted! You can now use voice input.';
                grantBtn.textContent = 'Success!';
                
                // Close window after 1.5 seconds
                setTimeout(() => {
                    window.close();
                }, 1500);
                
            } catch (error) {
                console.error('Permission error:', error);
                
                status.className = 'status error';
                
                if (error.name === 'NotAllowedError') {
                    status.textContent = '❌ Permission denied. Please click "Allow" when prompted.';
                } else if (error.name === 'NotFoundError') {
                    status.textContent = '❌ No microphone found. Please connect a microphone.';
                } else {
                    status.textContent = '❌ Error: ' + error.message;
                }
                
                grantBtn.disabled = false;
                grantBtn.textContent = 'Try Again';
            }
        });
    </script>
</body>
</html>
